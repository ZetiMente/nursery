# Example Nursery agent spec for Pi (Mario Zechner's agent toolkit).
# Pi is the self-extensible coding-agent substrate that OpenClaw is built on.
#   https://pi.dev
#   https://github.com/earendil-works/pi
#
# PROVISIONAL: this profile's integration details (how a Nursery container
# hands off to or runs alongside a pi-agent-core process) are not yet
# specified. Spawning will print a 'provisional' warning. See
# hosts/pi/README.md for current assumptions.
#
# Validate:  uv run nursery validate examples/agents/pi-layla.yaml
# Spawn:     uv run nursery spawn examples/agents/pi-layla.yaml

name: layla-pi
image: nursery/agent:base
host: pi
model: ollama/batiai/gemma4-e2b:q4
soul: ../souls/layla/SOUL.md
workspace: ~/nursery/agents/layla-pi/workspace

resources:
  memory: 6g
  cpus: 4.0

environment:
  LOG_LEVEL: info

labels:
  framework: pi
  author: earendil-works
  status: provisional
