# Example agent spec — safe to commit (references secrets by name, never by value).
# Validate with:  nursery validate examples/agents/example.yaml

# Required
name: example
image: nursery/agent:latest
model: anthropic/claude-opus
workspace: ~/nursery/agents/example/workspace

# Optional but recommended
soul: ../souls/example/SOUL.md

# Named secrets. Resolved by the host to files under /run/secrets/ in the container.
# Provision them on the host separately — see docs/secrets.md.
secrets:
  - google-oauth

# Channels the agent connects to (host gateway handles routing).
channels:
  - telegram

# Capabilities enforced by the host adapter.
capabilities:
  - gmail
  - calendar
  - tasks

# Optional resource limits.
resources:
  memory: 512m
  cpus: 1.0

# Optional non-secret environment variables.
# NEVER put secrets here — use the 'secrets' field instead.
environment:
  LOG_LEVEL: info

# Optional free-form metadata for the operator (not interpreted by Nursery).
labels:
  owner: example-owner
  purpose: demo
