# Example agent spec for Gemma 4 E2B on Pi via Ollama.
# Safe to commit — secrets referenced by name, never by value.
# Validate with:  uv run nursery validate examples/agents/gemma4-layla.yaml

name: layla-gemma4
image: nursery/agent:openclaw
# provider=ollama, model=batiai/gemma4-e2b:q4
model: ollama/batiai/gemma4-e2b:q4
soul: ../souls/layla/SOUL.md
workspace: ~/nursery/agents/layla-gemma4/workspace

# No secrets needed for a fully local model.
# No channels or capabilities yet — Phase 3 wires those in.

# Gentle resources for Pi 4.
resources:
  memory: 6g
  cpus: 4.0

# Non-secret environment. NURSERY_OLLAMA_URL defaults to
# http://host.docker.internal:11434 which reaches the host's Ollama daemon.
environment:
  LOG_LEVEL: info

labels:
  host: pi-4
  quant: q4_k_m
