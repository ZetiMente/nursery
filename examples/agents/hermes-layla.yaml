# Example Nursery agent spec for Hermes (Nous Research's agent framework).
# Hermes is the sibling of OpenClaw — persistent memory, skills,
# messaging gateway. API server listens on localhost:8642 by default.
#
# Validate:  uv run nursery validate examples/agents/hermes-layla.yaml
# Spawn:     uv run nursery spawn examples/agents/hermes-layla.yaml
#
# Requires: Hermes Agent installed on the host.
#   curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
#   hermes gateway &   # start the messaging gateway

name: layla-hermes
image: nursery/agent:base
host: hermes
model: ollama/batiai/gemma4-e2b:q4
soul: ../souls/layla/SOUL.md
workspace: ~/nursery/agents/layla-hermes/workspace

resources:
  memory: 6g
  cpus: 4.0

environment:
  LOG_LEVEL: info
  # If your Hermes gateway lives elsewhere, override:
  # NURSERY_GATEWAY_URL: http://gateway.local:8642

labels:
  framework: hermes-agent
  author: nous-research
